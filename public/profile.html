<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hype - Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #8b5cf6;
      --primary-dark: #7c3aed;
      --bg: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: #252525;
      --text: #fff;
      --text-secondary: #a0a0a0;
      --danger: #ef4444;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    header { position: sticky; top: 0; background: var(--bg-secondary); padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 100; border-bottom: 1px solid #333; }
    header a { color: var(--text); text-decoration: none; font-size: 24px; }
    header .title { font-size: 20px; font-weight: 600; }
    
    main { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
    
    .profile-header { text-align: center; margin-bottom: 24px; }
    .profile-header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; }
    .profile-header h2 { font-size: 24px; margin-bottom: 4px; }
    .profile-header .bio { color: var(--text-secondary); margin-bottom: 12px; }
    .profile-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 16px; }
    .profile-stats div { text-align: center; }
    .profile-stats .num { font-size: 20px; font-weight: bold; }
    .profile-stats .label { font-size: 12px; color: var(--text-secondary); }
    
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-outline { background: transparent; border: 1px solid #444; color: var(--text); }
    .btn-outline.following { border-color: var(--primary); color: var(--primary); }
    
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
    
    .feed-item { background: var(--bg-card); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .feed-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .feed-audio { width: 100%; margin: 12px 0; }
    .feed-actions { display: flex; gap: 16px; }
    .feed-action { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <header>
    <a href="/">←</a>
    <span class="title">Profile</span>
  </header>

  <main>
    <div id="profile-content">
      <div class="loading">Loading...</div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user');
    let currentUser = null;
    let isFollowing = false;

    async function init() {
      // Get current user
      try {
        const res = await fetch('/api/user');
        const data = await res.json();
        currentUser = data.user;
      } catch (e) {}

      if (!userId) {
        document.getElementById('profile-content').innerHTML = '<div class="empty">No user specified</div>';
        return;
      }


      loadProfile();
    }

    async function loadProfile() {
      try {
        const res = await fetch(`/api/users/${userId}`);
        const data = await res.json();
        
        if (res.status !== 200) {
          document.getElementById('profile-content').innerHTML = '<div class="empty">User not found</div>';
          return;
        }

        const p = data.profile;
        const recordings = data.recordings;

        // Check if following (if logged in)
        if (currentUser && currentUser.following) {
          isFollowing = currentUser.following.includes(userId);
        }

        const followBtn = currentUser && currentUser.id !== userId ? `
          <button class="btn ${isFollowing ? 'btn-outline following' : 'btn-primary'}" onclick="toggleFollow()">
            ${isFollowing ? 'Following' : 'Follow'}
          </button>
        ` : '';

        document.getElementById('profile-content').innerHTML = `
          <div class="profile-header">
            <img src="${p.photo}" alt="${p.name}">
            <h2>${p.name}</h2>
            <p class="bio">${p.bio || 'No bio yet'}</p>
            <div class="profile-stats">
              <div><div class="num">${p.recordingsCount}</div><div class="label">Tracks</div></div>
              <div><div class="num">${p.followers}</div><div class="label">Followers</div></div>
              <div><div class="num">${p.following}</div><div class="label">Following</div></div>
            </div>
            ${followBtn}
          </div>
          <h3 style="margin: 24px 0 16px;">Tracks</h3>
          ${recordings.length === 0 ? '<div class="empty">No tracks yet</div>' : recordings.map(r => `
            <div class="feed-item">
              <div class="feed-title">${r.title}</div>
              <audio controls class="feed-audio" src="${r.audioUrl}"></audio>
              <div class="feed-actions">
                <div class="feed-action"><span>❤️</span> ${r.likes}</div>
                <div class="feed-action"><span>👁️</span> ${r.plays || 0}</div>
              </div>
            </div>
          `).join('')}
        `;
      } catch (e) {
        document.getElementById('profile-content').innerHTML = '<div class="empty">Failed to load profile</div>';
      }
    }

    async function toggleFollow() {
      if (!currentUser) return alert('Please login first');
      try {
        await fetch(`/api/users/${userId}/follow`, { method: 'POST' });
        loadProfile();
      } catch (e) {
        alert('Failed to follow');
      }
    }

    init();
  </script>
</body>
</html>
